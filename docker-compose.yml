services:

  db:
    image: mysql:8.0

    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: ecommerce

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  api:

    build: .

    depends_on:
      - db

    ports:
      - "8000:8000"

    env_file:
      - .env

volumes:
  mysql_data: